name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --clean -F -w -n txt_speed_gui_final txt_speed_gui_final.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: txt_speed_gui_final-windows
          path: dist/txt_speed_gui_final.exe
