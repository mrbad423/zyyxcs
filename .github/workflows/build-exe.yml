name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyQt5 pyinstaller

      - name: Verify PyQt5
        run: |
          python -c "import PyQt5; print('PyQt5 OK')"

      - name: Clean old build
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          Get-ChildItem *.spec -ErrorAction SilentlyContinue | Remove-Item -Force

      - name: Build exe
        run: |
          python -m PyInstaller -F -w --name txt_speed_gui_final --collect-all PyQt5 --hidden-import=PyQt5 --hidden-import=PyQt5.sip txt_speed_gui_final.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: txt_speed_gui_final
          path: dist/txt_speed_gui_final.exe
